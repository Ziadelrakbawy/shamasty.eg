<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desert Summer | Premium Custom Automotive Shields</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FAF6EE; color: #2A2421; scroll-behavior: smooth; }
        .font-luxury { font-family: 'Cinzel', serif; }
    </style>
</head>
<body class="overflow-x-hidden relative">

    <header class="w-full max-w-7xl mx-auto p-6 flex justify-between items-center z-50 relative">
        <span class="font-luxury text-xl tracking-widest text-[#C86A52] font-bold">DESERT SUMMER</span>
        <button onclick="toggleCart()" class="bg-[#2A2421] hover:bg-[#403732] text-white px-6 py-2.5 rounded-full flex items-center space-x-2 transition text-sm shadow-sm">
            <span>🛒 Cart</span>
            <span id="cart-count" class="bg-[#FAF6EE] text-[#2A2421] font-bold text-xs px-2 py-0.5 rounded-full ml-1">0</span>
        </button>
    </header>

    <section class="min-h-[35vh] flex flex-col justify-center items-center text-center px-6 relative">
        <div class="absolute w-96 h-96 bg-[#C86A52]/5 rounded-full blur-3xl pointer-events-none"></div>
        <span class="text-[10px] font-bold tracking-widest text-[#C86A52] uppercase bg-[#C86A52]/10 px-4 py-1.5 rounded-full mb-6">Bespoke Interior Staging</span>
        <h1 class="font-luxury text-4xl md:text-6xl tracking-tight leading-tight mb-6 text-[#2A2421]">
            Shield the Heat.<br>
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-[#C86A52] via-[#5F8575] to-[#D1A153]">Command the Style.</span>
        </h1>
        <p class="text-xs text-gray-600 max-w-md mx-auto mb-8 font-medium">Premium custom-fit automotive sunshields tailored with exquisite fine-art accents.</p>
        <a href="#collection" class="bg-[#2A2421] text-white font-semibold px-8 py-4 rounded-full text-xs tracking-wider uppercase hover:bg-[#C86A52] transition duration-300 shadow-md">Explore Collection</a>
    </section>

    <section id="collection" class="py-12 px-6 max-w-7xl mx-auto">
        <div class="mb-16">
            <h2 class="font-luxury text-xl border-b border-[#2A2421]/10 pb-3 mb-8 text-[#C86A52] font-bold">01 / Graphic Art & Pattern Drops</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="bg-white border border-[#E6DFD3] rounded-2xl p-6 shadow-sm flex flex-col justify-between">
                    <img src="FRONT SHIELD_page-0003.jpg" onerror="this.onerror=null; this.src='https://placehold.co/400x400?text=Missing:FRONT+SHIELD_page-0003.jpg'" class="w-full h-auto block rounded-lg mb-4" alt="King Chess Skull">
                    <h3 class="font-luxury text-lg text-[#2A2421] mb-2 font-bold">King Chess Skull</h3>
                    <button onclick="addArtItem('King Chess Skull', 600)" class="w-full bg-[#2A2421] text-white py-3 rounded-xl text-xs uppercase transition">Add To Cart • 600 EGP</button>
                </div>
                <div class="bg-white border border-[#E6DFD3] rounded-2xl p-6 shadow-sm flex flex-col justify-between">
                    <img src="FRONT SHIELD_page-0010.jpg" onerror="this.onerror=null; this.src='https://placehold.co/400x400?text=Missing:FRONT+SHIELD_page-0010.jpg'" class="w-full h-auto block rounded-lg mb-4" alt="Wavy Lines">
                    <h3 class="font-luxury text-lg text-[#2A2421] mb-2 font-bold">Wavy Lines</h3>
                    <button onclick="addArtItem('Wavy Lines', 600)" class="w-full bg-[#2A2421] text-white py-3 rounded-xl text-xs uppercase transition">Add To Cart • 600 EGP</button>
                </div>
                <div class="bg-white border border-[#E6DFD3] rounded-2xl p-6 shadow-sm flex flex-col justify-between">
                    <img src="FRONT SHIELD_page-0012.jpg" onerror="this.onerror=null; this.src='https://placehold.co/400x400?text=Missing:FRONT+SHIELD_page-0012.jpg'" class="w-full h-auto block rounded-lg mb-4" alt="Coastal Horizons">
                    <h3 class="font-luxury text-lg text-[#2A2421] mb-2 font-bold">Coastal Horizons</h3>
                    <button onclick="addArtItem('Coastal Horizons', 600)" class="w-full bg-[#2A2421] text-white py-3 rounded-xl text-xs uppercase transition">Add To Cart • 600 EGP</button>
                </div>
            </div>
        </div>
    </section>

    <div id="cart-sidebar" class="fixed top-0 right-0 h-screen w-full max-w-md bg-[#FAF6EE] shadow-2xl z-50 border-l border-[#E6DFD3] flex flex-col hidden">
        <div class="p-6 border-b flex justify-between items-center bg-white">
            <h3 class="font-luxury text-lg font-bold">Your Cart</h3>
            <button onclick="toggleCart()" class="text-xs uppercase">Close</button>
        </div>
        <div id="cart-items-container" class="p-6 flex-grow overflow-y-auto"></div>
        <div class="p-6 border-t bg-white">
            <button onclick="submitOrderViaWhatsApp()" class="w-full bg-[#25D366] text-white py-4 rounded-xl text-xs font-bold uppercase">Complete on WhatsApp</button>
        </div>
    </div>

    <script>
        let shoppingCart = [];
        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('hidden'); }
        function addArtItem(name, price) {
            shoppingCart.push({ name, price, details: "Standard Edition" });
            updateCartInterface();
            toggleCart();
        }
        function updateCartInterface() {
            document.getElementById('cart-count').innerText = shoppingCart.length;
            const container = document.getElementById('cart-items-container');
            container.innerHTML = shoppingCart.map((item, i) => `
                <div class="bg-white p-4 mb-2 rounded border">
                    <h4 class="font-bold">${item.name}</h4>
                    <p class="text-xs">${item.price} EGP</p>
                </div>`).join('');
        }
        function submitOrderViaWhatsApp() {
            const phone = "201112220146";
            const text = "Hi, I would like to order: " + shoppingCart.map(i => i.name).join(", ");
            window.open('https://wa.me/' + phone + '?text=' + encodeURIComponent(text), '_blank');
        }
    </script>
</body>
</html>
