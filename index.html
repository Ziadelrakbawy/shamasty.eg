<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desert Summer | Premium Custom Automotive Shields</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FAF6EE; color: #2A2421; }
        .font-luxury { font-family: 'Cinzel', serif; }
    </style>
</head>
<body>

    <header class="max-w-7xl mx-auto p-6 flex justify-between items-center">
        <span class="font-luxury text-xl font-bold text-[#C86A52]">DESERT SUMMER</span>
        <button onclick="toggleCart()" class="bg-[#2A2421] text-white px-6 py-2 rounded-full text-sm">🛒 Cart (<span id="cart-count">0</span>)</button>
    </header>

    <main class="max-w-7xl mx-auto p-6">
        
        <h2 class="font-luxury text-xl border-b border-[#2A2421]/20 pb-4 mb-8 text-[#C86A52]">01 / Graphic Art Editions</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-white p-6 rounded-2xl border border-[#E6DFD3]">
                <img src="FRONT SHIELD_page-0003.jpg" class="w-full rounded-lg mb-4">
                <h3 class="font-bold text-lg mb-2">King Chess Skull</h3>
                <button onclick="addArtItem('King Chess Skull', 600)" class="w-full bg-[#2A2421] text-white py-3 rounded-xl text-xs uppercase tracking-widest">Add To Cart • 600 EGP</button>
            </div>
            <div class="bg-white p-6 rounded-2xl border border-[#E6DFD3]">
                <img src="FRONT SHIELD_page-0011.jpg" class="w-full rounded-lg mb-4">
                <h3 class="font-bold text-lg mb-2">Pirate Ship Venture</h3>
                <button onclick="addArtItem('Pirate Ship Venture', 600)" class="w-full bg-[#2A2421] text-white py-3 rounded-xl text-xs uppercase tracking-widest">Add To Cart • 600 EGP</button>
            </div>
        </div>

        <h2 class="font-luxury text-xl border-b border-[#2A2421]/20 pb-4 mt-16 mb-8 text-[#D1A153]">03 / Monogram Editions</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-white p-6 rounded-2xl border border-[#E6DFD3]">
                <img id="img-a" src="FRONT SHIELD_page-0004.jpg" class="w-full rounded-lg mb-4">
                <h3 class="font-bold text-lg mb-4">Angel Monogram Crest</h3>
                <select id="select-a" onchange="updateImage('a', this.value)" class="w-full p-3 mb-4 border rounded-lg text-sm bg-[#FAF6EE]">
                    <option value="0004">Luxury Tan</option>
                    <option value="0006">Sage Green</option>
                    <option value="0008">Terracotta Rust</option>
                </select>
                <input type="text" id="val-a" placeholder="Enter Initial" class="w-full p-3 mb-4 border rounded-lg text-sm">
                <button onclick="addMonogram('Angel Monogram Crest', 'a')" class="w-full bg-[#2A2421] text-white py-3 rounded-xl text-xs uppercase">Add To Cart • 650 EGP</button>
            </div>
        </div>
    </main>

    <div id="cart-sidebar" class="hidden fixed top-0 right-0 h-full w-full max-w-sm bg-white shadow-2xl p-6 border-l">
        <h2 class="text-lg font-bold mb-4">Your Cart</h2>
        <div id="cart-items" class="space-y-4"></div>
        <button onclick="checkout()" class="w-full bg-[#25D366] text-white py-4 rounded-xl mt-8">Order via WhatsApp</button>
    </div>

    <script>
        let cart = [];
        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('hidden'); }
        function updateImage(id, val) { document.getElementById('img-'+id).src = 'FRONT SHIELD_page-'+val+'.jpg'; }
        
        function addArtItem(name, price) {
            cart.push({name, price});
            updateCart();
        }

        function addMonogram(name, id) {
            let initial = document.getElementById('val-'+id).value;
            cart.push({name: name + " (" + initial + ")", price: 650});
            updateCart();
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            let list = document.getElementById('cart-items');
            list.innerHTML = cart.map(i => `<div class="p-2 border-b">${i.name} - ${i.price} EGP</div>`).join('');
        }

        function checkout() {
            let msg = "Order: " + cart.map(i => i.name).join(", ");
            window.open("https://wa.me/201112220146?text=" + encodeURIComponent(msg));
        }
    </script>
</body>
</html>
