<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shamasty | Premium Custom Automotive Shields</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght=500;700&family=Plus+Jakarta+Sans:wght=400;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FAF6EE; color: #2A2421; scroll-behavior: smooth; }
        .font-luxury { font-family: 'Cinzel', serif; }
    </style>
</head>
<body class="overflow-x-hidden relative">

    <!-- Header Navigation -->
    <header class="w-full max-w-7xl mx-auto p-6 flex justify-between items-center z-50 relative">
        <span class="font-luxury text-xl tracking-widest text-[#C86A52] font-bold">SHAMASTY</span>
        <button onclick="toggleCart()" class="bg-[#2A2421] hover:bg-[#403732] text-white px-6 py-2.5 rounded-full flex items-center space-x-2 transition text-sm shadow-sm">
            <span>🛒 Cart</span>
            <span id="cart-count" class="bg-[#FAF6EE] text-[#2A2421] font-bold text-xs px-2 py-0.5 rounded-full ml-1">0</span>
        </button>
    </header>

    <!-- Hero Section & Tab Controls -->
    <section class="min-h-[20vh] flex flex-col justify-center items-center text-center px-6 relative mb-4">
        <h1 class="font-luxury text-4xl md:text-5xl tracking-tight leading-tight mb-3 text-[#2A2421]">
            SHAMASTY STUDIO
        </h1>
        
        <!-- Navigation Menu Tabs -->
        <div class="flex flex-wrap justify-center gap-2 max-w-2xl bg-white/60 p-2 rounded-2xl border border-[#E6DFD3] backdrop-blur-sm shadow-sm mt-4">
            <button onclick="filterCatalog('all')" id="tab-all" class="px-6 py-2.5 text-xs font-bold rounded-xl transition bg-[#2A2421] text-white">Show All</button>
            <button onclick="filterCatalog('front')" id="tab-front" class="px-6 py-2.5 text-xs font-bold rounded-xl text-gray-600 hover:text-black transition">01 / Front Shields</button>
            <button onclick="filterCatalog('side')" id="tab-side" class="px-6 py-2.5 text-xs font-bold rounded-xl text-gray-600 hover:text-black transition">02 / Side Shields</button>
            <button onclick="filterCatalog('bundles')" id="tab-bundles" class="px-6 py-2.5 text-xs font-bold rounded-xl text-[#D1A153] hover:bg-[#D1A153]/10 transition">03 / Full Sets (Bundles)</button>
        </div>
    </section>

    <!-- Catalog Viewport -->
    <main class="py-4 px-6 max-w-7xl mx-auto w-full">
        
        <!-- SECTION 01: FRONT SHIELDS -->
        <div id="section-front" class="mb-16 block">
            <h2 class="font-luxury text-base border-b border-[#2A2421]/10 pb-3 mb-6 text-[#C86A52] font-bold tracking-wider">01 / FRONT WINDSHIELD DESIGNS</h2>
            <div id="grid-front-shields" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <!-- Injected via JavaScript -->
            </div>
        </div>

        <!-- SECTION 02: SIDE SHIELDS -->
        <div id="section-side" class="mb-16 block">
            <h2 class="font-luxury text-base border-b border-[#2A2421]/10 pb-3 mb-6 text-[#5F8575] font-bold tracking-wider">02 / FRONT SIDE WINDOW SHIELDS (PAIRS)</h2>
            <div id="grid-side-shields" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <!-- Injected via JavaScript -->
            </div>
        </div>

        <!-- SECTION 03: BUNDLES -->
        <div id="section-bundles" class="mb-16 block">
            <h2 class="font-luxury text-base border-b border-[#2A2421]/10 pb-3 mb-6 text-[#D1A153] font-bold tracking-wider">03 / PREMIUM FULL CABIN SUITE SETS</h2>
            <div id="grid-bundles" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Injected via JavaScript -->
            </div>
        </div>

    </main>

    <!-- Shopping Cart Sidebar -->
    <div id="cart-sidebar" class="fixed top-0 right-0 h-screen w-full max-w-md bg-[#FAF6EE] shadow-2xl z-50 border-l border-[#E6DFD3] flex flex-col justify-between hidden">
        <div class="p-6 border-b border-[#E6DFD3] flex justify-between items-center bg-white">
            <h3 class="font-luxury text-base font-bold text-[#2A2421]">Your Selection Cart</h3>
            <button onclick="toggleCart()" class="text-gray-500 hover:text-black font-semibold text-xs uppercase tracking-wider">✕ Close</button>
        </div>

        <div id="cart-items-container" class="p-6 overflow-y-auto flex-grow space-y-4">
            <!-- Renders dynamically -->
        </div>

        <div class="p-6 border-t border-[#E6DFD3] bg-white space-y-4">
            <div class="flex justify-between items-center font-bold text-sm text-[#2A2421]">
                <span>Order Total:</span>
                <span id="cart-total-display" class="text-base text-[#C86A52]">0 EGP</span>
            </div>
            <button onclick="submitOrderViaWhatsApp()" class="w-full bg-[#25D366] hover:bg-[#20ba5a] text-white font-bold py-4 rounded-xl text-xs uppercase tracking-wider transition flex items-center justify-center space-x-2 shadow-sm">
                <span>⚡ Send Order to WhatsApp</span>
            </button>
        </div>
    </div>

    <!-- Footer -->
    <footer class="py-12 border-t border-[#E6DFD3]/60 text-center text-[10px] text-gray-400 font-medium bg-white/40">
        <p>&copy; 2026 Shamasty Studio. All Rights Reserved.</p>
    </footer>

    <!-- JavaScript Data Engine -->
    <script>
        let shoppingCart = [];

        // 15 FRONT SHIELDS MAPPED TO THEIR EXACT FILENAMES
        const frontShieldsData = [
            { id: 1, title: "Front Shield Design #1 (صلي على النبي)", desc: "Spiritual custom typography layout baseline configurations.", price: 550, isSingleWord: true, tag: "Bespoke Typography", defaultImg: "1.png" },
            { id: 2, title: "Front Shield Design #2 (معلش)", desc: "Sarcastic custom statement typography layout configuration.", price: 550, isCustomText: true, tag: "Bespoke Typography", defaultImg: "2.png" },
            { id: 3, title: "Front Shield Design #3", desc: "Premium custom graphics layout framework configuration.", price: 600, tag: "Studio Edition", defaultImg: "3.png" },
            { id: 4, title: "Front Shield Design #4", desc: "Premium custom graphics layout framework configuration.", price: 600, tag: "Studio Edition", defaultImg: "4.png" },
            { id: 5, title: "Front Shield Design #5", desc: "Premium custom graphics layout framework configuration.", price: 600, tag: "Studio Edition", defaultImg: "5.png" },
            { id: 6, title: "Front Shield Design #6", desc: "Premium custom graphics layout framework configuration.", price: 600, tag: "Studio Edition", defaultImg: "6.png" },
            { id: 7, title: "Front Shield Design #7", desc: "Premium custom graphics layout framework configuration.", price: 600, tag: "Studio Edition", defaultImg: "7.png" },
            { id: 8, title: "Front Shield Design #8", desc: "Premium custom graphics layout framework configuration.", price: 600, tag: "Studio Edition", defaultImg: "8.png" },
            { id: 9, title: "Front Shield Design #9", desc: "Premium custom graphics layout framework configuration.", price: 650, tag: "Studio Edition", defaultImg: "9.png" },
            { id: 10, title: "Front Shield Design #10", desc: "Premium custom graphics layout framework configuration.", price: 600, tag: "Studio Edition", defaultImg: "10.png" },
            { id: 11, title: "Front Shield Design #11", desc: "Premium custom graphics layout framework configuration.", price: 600, tag: "Studio Edition", defaultImg: "11.png" },
            { id: 12, title: "Front Shield Design #12", desc: "Premium custom graphics layout framework configuration.", price: 600, tag: "Studio Edition", defaultImg: "12.png" },
            { id: 13, title: "Front Shield Design #13", desc: "Premium custom graphics layout framework configuration.", price: 550, tag: "Studio Edition", defaultImg: "13.png" },
            { id: 14, title: "Front Shield Design #14", desc: "Premium custom graphics layout framework configuration.", price: 550, tag: "Studio Edition", defaultImg: "14.png" },
            { id: 15, title: "Front Shield Design #15", desc: "Premium custom graphics layout framework configuration.", price: 550, tag: "Studio Edition", defaultImg: "15.png" }
        ];

        // 12 SIDE WINDOW PAIRS MAPPED TO 1.png THROUGH 24.png
        const sideShieldsData = [
            { id: 1, title: "Side Shield Pair #1", desc: "Custom parallel side cabin window protective profiles.", price: 350, tag: "Side Profile Pack", leftFile: "1.png", rightFile: "2.png" },
            { id: 2, title: "Side Shield Pair #2", desc: "Custom parallel side cabin window protective profiles.", price: 350, tag: "Side Profile Pack", leftFile: "3.png", rightFile: "4.png" },
            { id: 3, title: "Side Shield Pair #3", desc: "Custom parallel side cabin window protective profiles.", price: 400, tag: "Side Profile Pack", leftFile: "5.png", rightFile: "6.png" },
            { id: 4, title: "Side Shield Pair #4", desc: "Custom parallel side cabin window protective profiles.", price: 350, tag: "Side Profile Pack", leftFile: "7.png", rightFile: "8.png" },
            { id: 5, title: "Side Shield Pair #5", desc: "Custom parallel side cabin window protective profiles.", price: 350, tag: "Side Profile Pack", leftFile: "9.png", rightFile: "10.png" },
            { id: 6, title: "Side Shield Pair #6", desc: "Custom parallel side cabin window protective profiles.", price: 350, tag: "Side Profile Pack", leftFile: "11.png", rightFile: "12.png" },
            { id: 7, title: "Side Shield Pair #7", desc: "Custom parallel side cabin window protective profiles.", price: 350, tag: "Side Profile Pack", leftFile: "13.png", rightFile: "14.png" },
            { id: 8, title: "Side Shield Pair #8", desc: "Custom parallel side cabin window protective profiles.", price: 350, tag: "Side Profile Pack", leftFile: "15.png", rightFile: "16.png" },
            { id: 9, title: "Side Shield Pair #9", desc: "Custom parallel side cabin window protective profiles.", price: 350, tag: "Side Profile Pack", leftFile: "17.png", rightFile: "18.png" },
            { id: 10, title: "Side Shield Pair #10", desc: "Custom parallel side cabin window protective profiles.", price: 350, tag: "Side Profile Pack", leftFile: "19.png", rightFile: "20.png" },
            { id: 11, title: "Side Shield Pair #11", desc: "Custom parallel side cabin window protective profiles.", price: 350, tag: "Side Profile Pack", leftFile: "21.png", rightFile: "22.png" },
            { id: 12, title: "Side Shield Pair #12", desc: "Custom parallel side cabin window protective profiles.", price: 350, tag: "Side Profile Pack", leftFile: "23.png", rightFile: "24.png" }
        ];

        // 6 COMBINED PACK BUNDLES LINKED DIRECTLY TO BOTH IMAGES FOR FULL SET VISUALS
        const bundlesData = [
            { id: 1, title: "Full Cabin Suite Set #1", desc: "Includes Front Shield Design #1 combined with Side Shield Pair #1.", price: 850, frontImg: "1.png", sideImg: "1.png", tag: "Complete Pack" },
            { id: 2, title: "Full Cabin Suite Set #2", desc: "Includes Front Shield Design #2 combined with Side Shield Pair #2.", price: 850, frontImg: "2.png", sideImg: "3.png", tag: "Complete Pack" },
            { id: 3, title: "Full Cabin Suite Set #3", desc: "Includes Front Shield Design #3 combined with Side Shield Pair #3.", price: 900, frontImg: "3.png", sideImg: "5.png", tag: "Complete Pack" },
            { id: 4, title: "Full Cabin Suite Set #4", desc: "Includes Front Shield Design #4 combined with Side Shield Pair #4.", price: 850, frontImg: "4.png", sideImg: "7.png", tag: "Complete Pack" },
            { id: 5, title: "Full Cabin Suite Set #5", desc: "Includes Front Shield Design #5 combined with Side Shield Pair #5.", price: 850, frontImg: "5.png", sideImg: "9.png", tag: "Complete Pack" },
            { id: 6, title: "Full Cabin Suite Set #6", desc: "Includes Front Shield Design #6 combined with Side Shield Pair #6.", price: 850, frontImg: "6.png", sideImg: "11.png", tag: "Complete Pack" }
        ];

        window.onload = function() {
            renderCatalogGrids();
        };

        renderCatalogGrids = function() {
            const frontContainer = document.getElementById('grid-front-shields');
            const sideContainer = document.getElementById('grid-side-shields');
            const bundlesContainer = document.getElementById('grid-bundles');
            
            // Render Front Designs
            frontContainer.innerHTML = frontShieldsData.map(item => {
                let inputsHtml = '';
                let selectionTracker = `'Standard Fixed Design Setup'`;

                if (item.isCustomText) {
                    selectionTracker = `'Custom Phrase: \"' + document.getElementById('input-text-f-${item.id}').value + '\"'`;
                    inputsHtml = `
                        <div class="mt-2 bg-[#FAF6EE] p-2 rounded-xl border border-[#E6DFD3]">
                            <input type="text" id="input-text-f-${item.id}" placeholder="Type text layout..." class="w-full bg-white border border-[#E6DFD3] rounded-lg px-2 py-1 text-xs focus:outline-none">
                        </div>
                    `;
                } else if (item.isSingleWord) {
                    selectionTracker = `'Custom Word: \"' + document.getElementById('input-word-f-${item.id}').value + '\"'`;
                    inputsHtml = `
                        <div class="mt-2 bg-[#FAF6EE] p-2 rounded-xl border border-[#E6DFD3]">
                            <input type="text" id="input-word-f-${item.id}" placeholder="Type word layout..." class="w-full bg-white border border-[#E6DFD3] rounded-lg px-2 py-1 text-xs focus:outline-none">
                        </div>
                    `;
                }

                return `
                    <div class="bg-white border border-[#E6DFD3] rounded-2xl p-4 shadow-sm flex flex-col justify-between h-full">
                        <div>
                            <div class="w-full bg-[#fcfbfa] mb-3 border border-[#E6DFD3]/50 rounded-xl p-2 flex items-center justify-center h-40">
                                <img src="front/${item.defaultImg}" class="max-w-full max-h-full object-contain rounded-lg" alt="${item.title}">
                            </div>
                            <span class="text-[9px] font-bold text-[#C86A52] tracking-wider uppercase">${item.tag}</span>
                            <h3 class="font-luxury text-xs text-[#2A2421] mt-0.5 font-bold">${item.title}</h3>
                            <p class="text-[10px] text-gray-400 leading-tight">${item.desc}</p>
                            ${inputsHtml}
                        </div>
                        <button onclick="addFrontItemWithMeta('${item.title}', ${item.price}, ${selectionTracker}, ${item.isCustomText ? item.id : 'null'}, ${item.isSingleWord ? item.id : 'null'})" class="mt-3 w-full bg-[#2A2421] hover:bg-[#C86A52] text-white font-semibold py-2.5 rounded-xl text-[10px] uppercase tracking-wider transition shadow-sm">Add • ${item.price} EGP</button>
                    </div>
                `;
            }).join('');

            // Render Side Pairs
            sideContainer.innerHTML = sideShieldsData.map(item => {
                return `
                    <div class="bg-white border border-[#E6DFD3] rounded-2xl p-4 shadow-sm flex flex-col justify-between h-full">
                        <div>
                            <div class="w-full bg-[#fcfbfa] mb-3 border border-[#E6DFD3]/50 rounded-xl p-2 flex flex-col space-y-1 justify-center items-center h-40">
                                <img src="side/${item.leftFile}" class="w-1/2 h-full object-contain inline-block" alt="Side L">
                                <img src="side/${item.rightFile}" class="w-1/2 h-full object-contain inline-block" alt="Side R">
                            </div>
                            <span class="text-[9px] font-bold text-[#5F8575] tracking-wider uppercase">${item.tag}</span>
                            <h3 class="font-luxury text-xs text-[#2A2421] mt-0.5 font-bold">${item.title}</h3>
                            <p class="text-[10px] text-gray-400 leading-tight">${item.desc}</p>
                        </div>
                        <button onclick="addSideItemWithMeta('${item.title}', ${item.price}, 'Standard Pair Set')" class="mt-3 w-full bg-[#2A2421] hover:bg-[#5F8575] text-white font-semibold py-2.5 rounded-xl text-[10px] uppercase tracking-wider transition shadow-sm">Add Pair • ${item.price} EGP</button>
                    </div>
                `;
            }).join('');

            // Render Bundles with Visual Dynamic Side-by-Side Complete Previews
            bundlesContainer.innerHTML = bundlesData.map(bundle => {
                return `
                    <div class="bg-white border-2 border-[#D1A153] rounded-2xl p-5 shadow-sm flex flex-col justify-between h-full relative">
                        <div class="absolute top-3 right-3 bg-[#D1A153] text-white font-bold text-[8px] uppercase tracking-widest px-2 py-0.5 rounded-full">Suite Set</div>
                        <div>
                            <!-- Visual Combo Preview Box -->
                            <div class="w-full bg-[#FAF6EE] mb-4 border border-[#D1A153]/30 rounded-xl p-2 flex items-center justify-between h-40 space-x-2">
                                <div class="w-1/2 h-full flex flex-col items-center justify-center bg-white rounded-lg p-1 border border-dashed border-gray-200">
                                    <span class="text-[8px] text-gray-400 font-bold mb-1">FRONT</span>
                                    <img src="front/${bundle.frontImg}" class="max-w-full max-h-[80%] object-contain" alt="Front Pack UI">
                                </div>
                                <div class="w-1/2 h-full flex flex-col items-center justify-center bg-white rounded-lg p-1 border border-dashed border-gray-200">
                                    <span class="text-[8px] text-gray-400 font-bold mb-1">SIDE WINDOW</span>
                                    <img src="side/${bundle.sideImg}" class="max-w-full max-h-[80%] object-contain" alt="Side Pack UI">
                                </div>
                            </div>

                            <span class="text-[9px] font-bold text-[#D1A153] tracking-wider uppercase">${bundle.tag}</span>
                            <h3 class="font-luxury text-sm text-[#2A2421] mt-0.5 font-bold">${bundle.title}</h3>
                            <p class="text-[11px] text-gray-500 mb-2 leading-relaxed">${bundle.desc}</p>
                        </div>
                        <button onclick="addSideItemWithMeta('${bundle.title}', ${bundle.price}, 'Full Set Bundle Portfolio')" class="w-full mt-2 bg-[#D1A153] hover:bg-[#2A2421] text-white font-bold py-3 rounded-xl text-xs uppercase tracking-wider transition shadow-sm">Add Complete Suite • ${bundle.price} EGP</button>
                    </div>
                `;
            }).join('');
        }

        function addFrontItemWithMeta(title, price, meta, customTextId, singleWordId) {
            if (customTextId) {
                const txt = document.getElementById(`input-text-f-${customTextId}`).value.trim();
                if (!txt) { alert("Please specify custom phrase allocation layout text!"); return; }
            }
            if (singleWordId) {
                const word = document.getElementById(`input-word-f-${singleWordId}`).value.trim();
                if (!word) { alert("Please specify custom single word alignment text!"); return; }
            }
            shoppingCart.push({ name: title, price: price, details: meta });
            updateCartInterface();
            toggleCart();
        }

        function addSideItemWithMeta(title, price, meta) {
            shoppingCart.push({ name: title, price: price, details: meta });
            updateCartInterface();
            toggleCart();
        }

        function removeCartItem(index) {
            shoppingCart.splice(index, 1);
            updateCartInterface();
        }

        function updateCartInterface() {
            document.getElementById('cart-count').innerText = shoppingCart.length;
            const container = document.getElementById('cart-items-container');
            const totalDisplay = document.getElementById('cart-total-display');
            
            if (shoppingCart.length === 0) {
                container.innerHTML = '<p class="text-gray-400 text-xs text-center py-12 font-medium">Your shopping cart is currently empty.</p>';
                totalDisplay.innerText = '0 EGP';
                return;
            }

            container.innerHTML = shoppingCart.map((item, idx) => `
                <div class="bg-white border border-[#E6DFD3] p-4 rounded-xl flex justify-between items-start text-xs shadow-sm">
                    <div>
                        <h4 class="font-bold text-[#2A2421]">${item.name}</h4>
                        <p class="text-gray-400 mt-1 text-[10px]">Config: ${item.details}</p>
                        <span class="text-[#C86A52] font-semibold mt-1 inline-block">${item.price} EGP</span>
                    </div>
                    <button onclick="removeCartItem(${idx})" class="text-red-500 font-bold uppercase text-[10px] ml-2">Remove</button>
                </div>
            `).join('');

            let combinedTotal = shoppingCart.reduce((sum, item) => sum + item.price, 0);
            totalDisplay.innerText = combinedTotal.toLocaleString() + ' EGP';
        }

        function filterCatalog(category) {
            document.getElementById('section-front').style.display = (category === 'all' || category === 'front') ? 'block' : 'none';
            document.getElementById('section-side').style.display = (category === 'all' || category === 'side') ? 'block' : 'none';
            document.getElementById('section-bundles').style.display = (category === 'all' || category === 'bundles') ? 'block' : 'none';
        }

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('hidden');
        }

        function submitOrderViaWhatsApp() {
            if (shoppingCart.length === 0) { alert("Your cart is empty!"); return; }
            let message = 'Hi Shamasty! I want to order:\n\n';
            shoppingCart.forEach((item, idx) => {
                message += `${idx + 1}. ${item.name} (${item.details}) - ${item.price} EGP\n`;
            });
            let total = shoppingCart.reduce((sum, item) => sum + item.price, 0);
            message += `\nTotal: ${total} EGP`;
            window.open('https://wa.me/201112220146?text=' + encodeURIComponent(message), '_blank');
        }
    </script>
</body>
</html>
