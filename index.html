<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shamasty | Premium Custom Automotive Shields</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght=500;700&family=Plus+Jakarta+Sans:wght=400;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FAF6EE; color: #2A2421; scroll-behavior: smooth; }
        .font-luxury { font-family: 'Cinzel', serif; }
    </style>
</head>
<body class="overflow-x-hidden relative">

    <header class="w-full max-w-7xl mx-auto p-6 flex justify-between items-center z-50 relative">
        <span class="font-luxury text-xl tracking-widest text-[#C86A52] font-bold">SHAMASTY</span>
        <button onclick="toggleCart()" class="bg-[#2A2421] hover:bg-[#403732] text-white px-6 py-2.5 rounded-full flex items-center space-x-2 transition text-sm shadow-sm">
            <span>🛒 Cart</span>
            <span id="cart-count" class="bg-[#FAF6EE] text-[#2A2421] font-bold text-xs px-2 py-0.5 rounded-full ml-1">0</span>
        </button>
    </header>

    <section class="min-h-[20vh] flex flex-col justify-center items-center text-center px-6 relative mb-4">
        <h1 class="font-luxury text-4xl md:text-5xl tracking-tight leading-tight mb-3 text-[#2A2421]">
            SHAMASTY STUDIO
        </h1>
        
        <div class="flex flex-wrap justify-center gap-2 max-w-2xl bg-white/60 p-2 rounded-2xl border border-[#E6DFD3] backdrop-blur-sm shadow-sm mt-4">
            <button onclick="filterCatalog('all')" id="tab-all" class="px-6 py-2.5 text-xs font-bold rounded-xl transition bg-[#2A2421] text-white">Show All</button>
            <button onclick="filterCatalog('front')" id="tab-front" class="px-6 py-2.5 text-xs font-bold rounded-xl text-gray-600 hover:text-black transition">01 / Front Shields</button>
            <button onclick="filterCatalog('side')" id="tab-side" class="px-6 py-2.5 text-xs font-bold rounded-xl text-gray-600 hover:text-black transition">02 / Side Shields</button>
            <button onclick="filterCatalog('bundles')" id="tab-bundles" class="px-6 py-2.5 text-xs font-bold rounded-xl text-[#D1A153] hover:bg-[#D1A153]/10 transition">03 / Full Sets (Bundles)</button>
        </div>
    </section>

    <main class="py-4 px-6 max-w-7xl mx-auto w-full">
        
        <div id="section-front" class="mb-16 block">
            <h2 class="font-luxury text-base border-b border-[#2A2421]/10 pb-3 mb-6 text-[#C86A52] font-bold tracking-wider">01 / FRONT WINDSHIELD DESIGNS</h2>
            <div id="grid-front-shields" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                </div>
        </div>

        <div id="section-side" class="mb-16 block">
            <h2 class="font-luxury text-base border-b border-[#2A2421]/10 pb-3 mb-6 text-[#5F8575] font-bold tracking-wider">02 / FRONT SIDE WINDOW SHIELDS (MATCHING PAIRS)</h2>
            <div id="grid-side-shields" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                </div>
        </div>

        <div id="section-bundles" class="mb-16 block">
            <h2 class="font-luxury text-base border-b border-[#2A2421]/10 pb-3 mb-6 text-[#D1A153] font-bold tracking-wider">03 / PREMIUM FULL CABIN SUITE SETS</h2>
            <div id="grid-bundles" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
        </div>

    </main>

    <div id="cart-sidebar" class="fixed top-0 right-0 h-screen w-full max-w-md bg-[#FAF6EE] shadow-2xl z-50 border-l border-[#E6DFD3] flex flex-col justify-between hidden">
        <div class="p-6 border-b border-[#E6DFD3] flex justify-between items-center bg-white">
            <h3 class="font-luxury text-base font-bold text-[#2A2421]">Your Selection Cart</h3>
            <button onclick="toggleCart()" class="text-gray-500 hover:text-black font-semibold text-xs uppercase tracking-wider">✕ Close</button>
        </div>

        <div id="cart-items-container" class="p-6 overflow-y-auto flex-grow space-y-4">
            </div>

        <div class="p-6 border-t border-[#E6DFD3] bg-white space-y-4">
            <div class="flex justify-between items-center font-bold text-sm text-[#2A2421]">
                <span>Order Total:</span>
                <span id="cart-total-display" class="text-base text-[#C86A52]">0 EGP</span>
            </div>
            <button onclick="submitOrderViaWhatsApp()" class="w-full bg-[#25D366] hover:bg-[#20ba5a] text-white font-bold py-4 rounded-xl text-xs uppercase tracking-wider transition flex items-center justify-center space-x-2 shadow-sm">
                <span>⚡ Send Order to WhatsApp</span>
            </button>
        </div>
    </div>

            const bundlesContainer = document.getElementById('grid-bundles');

                    inputsHtml = `

                        </div>
                    `;

                        <div class="mt-2 bg-[#FAF6EE] p-2 rounded-xl border border-[#E6DFD3]">
                            <input type="text" id="input-word-f-${item.id}" placeholder="Type word layout..." class="w-full bg-white border border-[#E6DFD3] rounded-lg px-2 py-1 text-xs focus:outline-none">
                        </div>
                    `;

                                    <img src="front/${bundle.frontImg}" class="max-w-full max-h-[80%] object-contain" alt="Front Match UI">
                                </div>
                                <div class="w-1/2 h-full flex flex-col items-center justify-center bg-white rounded-lg p-1 border border-dashed border-gray-200 overflow-hidden">
